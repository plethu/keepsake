id: rust-if-let-policy-cascade
valid:
  - |
    fn one(a: Option<i32>) {
        if let Some(x) = a { let _ = x; }
    }
  - |
    fn separated(a: Option<i32>, b: Option<i32>) {
        if let Some(x) = a { let _ = x; }
        let _mark = 1;
        if let Some(y) = b { let _ = y; }
    }
invalid:
  - |
    fn two(a: Option<i32>, b: Option<i32>) {
        if let Some(x) = a { let _ = x; }
        if let Some(y) = b { let _ = y; }
    }
  - |
    fn intervening(a: Option<i32>, b: Option<i32>, c: Option<i32>) {
        if let Some(x) = a { let _ = x; }
        let _mark = 1;
        if let Some(y) = b { let _ = y; }
        if let Some(z) = c { let _ = z; }
    }
