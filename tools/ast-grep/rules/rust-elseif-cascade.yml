id: rust-elseif-cascade
language: Rust
severity: error
message: Long if/else-if cascade (≥3 branches) may hide priority in branch order; prefer match on an enum or an explicit dispatch table.
note: |
  Matches 3 branches (one `if` + two `else if`).
  Suppress a true positive with `// ast-grep-ignore: rust-elseif-cascade`.
rule:
  pattern: |
    if $A {
      $$$THEN0
    } else if $B {
      $$$THEN1
    } else if $C {
      $$$THEN2
    }
