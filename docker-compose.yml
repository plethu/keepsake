services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: keepsake
      POSTGRES_USER: keepsake
      POSTGRES_PASSWORD: keepsake
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keepsake -d keepsake"]
      interval: 2s
      timeout: 2s
      retries: 20
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: keepsake
      MYSQL_USER: keepsake
      MYSQL_PASSWORD: keepsake
      MYSQL_ROOT_PASSWORD: keepsake-root
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u keepsake -pkeepsake --silent"]
      interval: 2s
      timeout: 2s
      retries: 30
